id = "herdr.hordr"
name = "Hordr"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "Generic agent orchestrator — sequence agents through workflows with HITL gates"
platforms = ["linux", "macos"]

[[actions]]
id = "run"
title = "Run a bean through its workflow"
contexts = ["workspace"]
command = ["hordr", "run"]

[[actions]]
id = "decompose"
title = "Decompose an epic into child task beans"
contexts = ["workspace"]
command = ["hordr", "decompose"]

[[actions]]
id = "status"
title = "Show horde status"
contexts = ["workspace"]
command = ["hordr", "status"]

[[actions]]
id = "drain"
title = "Drain the queue (start ready beans)"
contexts = ["workspace"]
command = ["hordr", "drain"]

[[actions]]
id = "close-merged"
title = "Close beans whose PRs have merged"
contexts = ["workspace"]
command = ["hordr", "close-merged"]

[[actions]]
id = "reset"
title = "Reset a bean's run (delete worktree + state)"
contexts = ["workspace"]
command = ["hordr", "reset"]

[[actions]]
id = "take"
title = "Take over a blocked bean interactively"
contexts = ["workspace"]
command = ["hordr", "take"]

# Event hooks
[[events]]
on = "worktree.created"
command = ["hordr", "on-worktree-created"]

[[events]]
on = "worktree.removed"
command = ["hordr", "on-worktree-removed"]
